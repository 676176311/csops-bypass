name: Build CSOpsBypass

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      THEOS: ~/theos
    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos & SDK
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          # Download iOS SDKs so Theos can find them
          curl -fsSL -o /tmp/sdks.tar.gz https://github.com/theos/sdks/archive/refs/heads/master.tar.gz
          mkdir -p ~/theos/sdks
          tar -xzf /tmp/sdks.tar.gz --strip-components=1 -C ~/theos/sdks

      - name: Build package
        run: |
          make package FINALPACKAGE=1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CSOpsBypass-deb
          path: packages/*.deb

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: packages/*.deb
