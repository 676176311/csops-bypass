name: Build CSOpsBypass

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential fakeroot dpkg-dev libxml2-dev libssl-dev libplist-utils ldid

      - name: Setup Theos & iOS SDK
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          curl -fsSL -o /tmp/sdks.tar.gz \
            https://github.com/theos/sdks/archive/refs/heads/master.tar.gz
          mkdir -p ~/theos/sdks
          tar -xzf /tmp/sdks.tar.gz --strip-components=1 -C ~/theos/sdks

      - name: Build package
        run: |
          export THEOS=~/theos
          export PATH="$THEOS/bin:$PATH"
          make package FINALPACKAGE=1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CSOpsBypass-deb
          path: packages/*.deb

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: packages/*.deb
